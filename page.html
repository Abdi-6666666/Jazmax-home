<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jazmax/E </title>
    <style>
        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }

        /* 赛博朋克背景与基础样式 */
        body {
            background: #0a0a14;
            background-image: 
                radial-gradient(circle at 50% 50%, #1a1a30 0%, #0a0a14 100%),
                url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M11 18c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm48 25c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm-43-7c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm63 31c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM34 90c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm56-76c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM12 86c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm28-65c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm23-11c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-6 60c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm29 22c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zM32 63c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm57-13c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-9-21c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM60 91c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM35 41c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM12 60c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2z' fill='%232a2a40' fill-opacity='0.4' fill-rule='evenodd'/%3E%3C/svg%3E");
            color: #00ffea;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* 故障艺术标题效果 */
        .glitch-title {
            position: relative;
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 900;
            text-transform: uppercase;
            text-align: center;
            padding: 2rem 0;
            color: #ff00ff;
            text-shadow: 
                0 0 5px #ff00ff,
                0 0 10px #ff00ff,
                0 0 20px #ff00ff,
                0 0 40px #ff00ff;
            animation: flicker 2s infinite alternate;
        }

        .glitch-title::before,
        .glitch-title::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .glitch-title::before {
            left: 2px;
            text-shadow: -2px 0 #00ffea;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim 5s infinite linear alternate-reverse;
        }

        .glitch-title::after {
            left: -2px;
            text-shadow: -2px 0 #ff00ff;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim2 5s infinite linear alternate-reverse;
        }

        /* 主容器 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* 个人信息卡片 */
        .profile-card {
            border: 2px solid;
            border-image: linear-gradient(45deg, #ff00ff, #00ffea, #ffff00) 1;
            background: rgba(10, 10, 20, 0.8);
            padding: 2rem;
            margin-bottom: 3rem;
            border-radius: 4px;
            box-shadow: 
                0 0 10px #ff00ff,
                0 0 20px rgba(255, 0, 255, 0.5),
                inset 0 0 10px #00ffea;
            position: relative;
            overflow: hidden;
        }

        /* 卡片装饰线条 */
        .profile-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00ffea, transparent);
            animation: scan-line 3s linear infinite;
        }

        /* 头像样式 */
        .avatar {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            margin: 0 auto 2rem;
            border: 3px solid #ff00ff;
            box-shadow: 0 0 15px #ff00ff, inset 0 0 15px #00ffea;
            overflow: hidden;
            position: relative;
        }

        .avatar::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 70%, rgba(0, 255, 234, 0.3));
            pointer-events: none;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%) contrast(120%) brightness(80%);
            mix-blend-mode: screen;
        }

        /* 文本样式 */
        .profile-info h2 {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            color: #00ffea;
            margin-bottom: 1rem;
            text-shadow: 0 0 5px #00ffea;
            border-bottom: 1px solid #ff00ff;
            padding-bottom: 0.5rem;
        }

        .profile-info p {
            font-size: clamp(1rem, 2vw, 1.2rem);
            margin-bottom: 1.5rem;
            color: #ffffff;
            text-shadow: 0 0 3px #00ffea;
        }

        /* 技能标签 */
        .skills {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin: 2rem 0;
        }

        .skill-tag {
            padding: 0.8rem 1.5rem;
            background: rgba(255, 0, 255, 0.2);
            border: 1px solid #00ffea;
            border-radius: 2px;
            color: #ffff00;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 8px rgba(0, 255, 234, 0.4);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .skill-tag::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .skill-tag:hover {
            background: rgba(0, 255, 234, 0.3);
            transform: translateY(-3px);
            box-shadow: 0 0 15px #ff00ff;
        }

        .skill-tag:hover::before {
            left: 100%;
        }

        /* 霓虹按钮 */
        .neon-btn {
            display: inline-block;
            padding: 1rem 2rem;
            margin-top: 1rem;
            background: transparent;
            border: 2px solid #ff00ff;
            color: #00ffea;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            text-decoration: none;
            border-radius: 2px;
            box-shadow: 0 0 10px #ff00ff, inset 0 0 10px #ff00ff;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .neon-btn:hover {
            color: #0a0a14;
            background: #00ffea;
            box-shadow: 0 0 20px #00ffea, inset 0 0 20px #00ffea;
            border-color: #00ffea;
        }

        /* 底部信息 */
        .footer {
            text-align: center;
            margin-top: 4rem;
            padding: 2rem;
            border-top: 1px solid;
            border-image: linear-gradient(90deg, transparent, #ff00ff, transparent) 1;
            color: #00ffea;
            font-size: 0.9rem;
        }

        /* 动画定义 */
        @keyframes flicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {
                opacity: 1;
            }
            20%, 22%, 24%, 55% {
                opacity: 0.5;
            }
        }

        @keyframes glitch-anim {
            0% {
                clip: rect(15px, 9999px, 16px, 0);
            }
            5% {
                clip: rect(9px, 9999px, 80px, 0);
            }
            10% {
                clip: rect(74px, 9999px, 86px, 0);
            }
            15% {
                clip: rect(55px, 9999px, 35px, 0);
            }
            20% {
                clip: rect(63px, 9999px, 41px, 0);
            }
            25% {
                clip: rect(17px, 9999px, 90px, 0);
            }
            30% {
                clip: rect(86px, 9999px, 33px, 0);
            }
            35% {
                clip: rect(20px, 9999px, 28px, 0);
            }
            40% {
                clip: rect(26px, 9999px, 60px, 0);
            }
            45% {
                clip: rect(25px, 9999px, 66px, 0);
            }
            50% {
                clip: rect(5px, 9999px, 55px, 0);
            }
            55% {
                clip: rect(33px, 9999px, 98px, 0);
            }
            60% {
                clip: rect(76px, 9999px, 37px, 0);
            }
            65% {
                clip: rect(63px, 9999px, 28px, 0);
            }
            70% {
                clip: rect(67px, 9999px, 68px, 0);
            }
            75% {
                clip: rect(7px, 9999px, 97px, 0);
            }
            80% {
                clip: rect(46px, 9999px, 79px, 0);
            }
            85% {
                clip: rect(50px, 9999px, 50px, 0);
            }
            90% {
                clip: rect(60px, 9999px, 72px, 0);
            }
            95% {
                clip: rect(96px, 9999px, 78px, 0);
            }
            100% {
                clip: rect(13px, 9999px, 95px, 0);
            }
        }

        @keyframes glitch-anim2 {
            0% {
                clip: rect(85px, 9999px, 96px, 0);
            }
            5% {
                clip: rect(25px, 9999px, 88px, 0);
            }
            10% {
                clip: rect(5px, 9999px, 33px, 0);
            }
            15% {
                clip: rect(65px, 9999px, 46px, 0);
            }
            20% {
                clip: rect(86px, 9999px, 8px, 0);
            }
            25% {
                clip: rect(23px, 9999px, 29px, 0);
            }
            30% {
                clip: rect(38px, 9999px, 73px, 0);
            }
            35% {
                clip: rect(58px, 9999px, 20px, 0);
            }
            40% {
                clip: rect(45px, 9999px, 96px, 0);
            }
            45% {
                clip: rect(33px, 9999px, 29px, 0);
            }
            50% {
                clip: rect(86px, 9999px, 56px, 0);
            }
            55% {
                clip: rect(35px, 9999px, 86px, 0);
            }
            60% {
                clip: rect(46px, 9999px, 21px, 0);
            }
            65% {
                clip: rect(98px, 9999px, 75px, 0);
            }
            70% {
                clip: rect(42px, 9999px, 89px, 0);
            }
            75% {
                clip: rect(82px, 9999px, 79px, 0);
            }
            80% {
                clip: rect(41px, 9999px, 97px, 0);
            }
            85% {
                clip: rect(88px, 9999px, 10px, 0);
            }
            90% {
                clip: rect(28px, 9999px, 74px, 0);
            }
            95% {
                clip: rect(47px, 9999px, 37px, 0);
            }
            100% {
                clip: rect(26px, 9999px, 55px, 0);
            }
        }

        @keyframes scan-line {
            0% {
                transform: translateX(-100%);
            }
            100% {
                transform: translateX(100%);
            }
        }

        /* 响应式适配 */
        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }
            .avatar {
                width: 140px;
                height: 140px;
            }
            .skills {
                justify-content: center;
            }
            .skill-tag {
                padding: 0.6rem 1.2rem;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <h1 class="glitch-title" data-text="Jazmax/E">Jazmax/E</h1>
    
    <div class="container">
        <div class="profile-card">
            <div class="avatar">

    <!-- 可选：添加鼠标跟随霓虹效果 -->
    <script>
        // 鼠标跟随霓虹光效
        document.addEventListener('mousemove', (e) => {
            const body = document.body;
            body.style.setProperty('--mouse-x', `${e.clientX}px`);
            body.style.setProperty('--mouse-y', `${e.clientY}px`);
        });

        // 页面加载动画
        window.addEventListener('load', () => {
            document.body.classList.add('loaded');
        });
    </script>
</body>
